html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plaza Latina — Restaurant Owner Orientation</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FAF3E8;
    --espresso: #3F2518;
    --rust: #C25A30;
    --gold: #D4A843;
    --sage: #6B7C5E;
    --warm-gray: #B8AFA5;
    --card-bg: #FFFDF9;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--cream); color: var(--espresso); font-family: 'DM Sans', sans-serif; font-weight: 300; line-height: 1.7; }
  .pl-header { background: var(--espresso); color: var(--cream); padding: 48px 32px 40px; text-align: center; }
  .pl-badge { display: inline-block; border: 1px solid var(--gold); color: var(--gold); font-size: 11px; letter-spacing: 3px; text-transform: uppercase; padding: 5px 16px; margin-bottom: 18px; }
  .pl-h1 { font-family: 'Playfair Display', Georgia, serif; font-size: clamp(30px,5vw,54px); font-weight: 900; line-height: 1.1; margin-bottom: 14px; }
  .pl-h1 em { color: var(--gold); font-style: italic; }
  .pl-hsub { font-size: 14px; color: var(--warm-gray); max-width: 440px; margin: 0 auto; }
  .pl-topbar { background: var(--espresso); padding: 0 32px 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
  .pl-steps { display: flex; gap: 4px; flex-wrap: wrap; }
  .pl-pill { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--warm-gray); padding: 5px 12px; border-radius: 20px; border: 1px solid rgba(184,175,165,0.25); }
  .pl-pill.active { background: var(--gold); color: var(--espresso); font-weight: 500; border-color: var(--gold); }
  .pl-lang { display: flex; border: 1px solid rgba(212,168,67,0.5); border-radius: 20px; overflow: hidden; }
  .pl-lbtn { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; padding: 6px 16px; cursor: pointer; color: var(--warm-gray); background: transparent; border: none; font-family: inherit; transition: all 0.2s; }
  .pl-lbtn.active { background: var(--gold); color: var(--espresso); font-weight: 500; }
  .pl-container { max-width: 820px; margin: 0 auto; padding: 0 20px 60px; }
  .pl-welcome { background: var(--espresso); color: var(--cream); border-radius: 4px; padding: 36px; margin-top: 40px; }
  .pl-welcome h2 { font-family: 'Playfair Display', Georgia, serif; font-size: 20px; margin-bottom: 12px; color: var(--gold); }
  .pl-welcome p { font-size: 14px; color: rgba(249,244,236,0.82); line-height: 1.85; }
  .pl-section { margin-top: 52px; }
  .pl-sec-label { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
  .pl-num { width: 34px; height: 34px; border-radius: 50%; background: var(--rust); color: white; font-family: 'Playfair Display', Georgia, serif; font-size: 15px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .pl-sec-title { font-family: 'Playfair Display', Georgia, serif; font-size: 24px; font-weight: 700; color: var(--espresso); }
  .pl-card { background: var(--card-bg); border: 1px solid rgba(44,26,14,0.1); border-radius: 4px; padding: 28px 32px; }
  .pl-card p { font-size: 14px; color: #4A3728; margin-bottom: 12px; }
  .pl-card p:last-child { margin-bottom: 0; }
  .pl-hint { border-left: 3px solid var(--gold); background: rgba(212,168,67,0.07); padding: 16px 20px; border-radius: 0 4px 4px 0; margin-top: 14px; font-size: 13px; color: #4A3728; }
  .pl-sgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 6px; }
  @media(max-width:540px){ .pl-sgrid { grid-template-columns: 1fr; } }
  .pl-scard { border: 1px solid rgba(44,26,14,0.1); border-radius: 4px; padding: 18px; background: white; }
  .pl-scard .ic { font-size: 24px; margin-bottom: 8px; display: block; }
  .pl-scard h4 { font-family: 'Playfair Display', Georgia, serif; font-size: 15px; font-weight: 700; margin-bottom: 5px; color: var(--espresso); }
  .pl-scard p { font-size: 13px; color: #6B5A4E; line-height: 1.6; margin: 0; }
  .pl-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .pl-table th { text-align: left; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--warm-gray); padding: 8px 14px; border-bottom: 2px solid rgba(44,26,14,0.08); }
  .pl-table td { padding: 12px 14px; border-bottom: 1px solid rgba(44,26,14,0.06); color: #3D2B1F; vertical-align: top; }
  .pl-table tr:last-child td { border-bottom: none; }
  .pl-cl { list-style: none; padding: 0; margin: 0; }
  .pl-cl li { display: flex; align-items: flex-start; gap: 12px; padding: 12px 0; border-bottom: 1px solid rgba(44,26,14,0.06); cursor: pointer; }
  .pl-cl li:last-child { border-bottom: none; }
  .pl-cl li.done { opacity: 0.42; text-decoration: line-through; color: var(--warm-gray); }
  .pl-cb { width: 20px; height: 20px; border: 2px solid rgba(44,26,14,0.22); border-radius: 3px; flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center; background: white; transition: all 0.18s; }
  .pl-cl li.done .pl-cb { background: var(--sage); border-color: var(--sage); }
  .pl-cb-check { display: none; width: 11px; height: 6px; border-left: 2px solid white; border-bottom: 2px solid white; transform: rotate(-45deg) translateY(-1px); }
  .pl-cl li.done .pl-cb-check { display: block; }
  .pl-il { flex: 1; font-size: 14px; color: #3D2B1F; }
  .pl-il small { font-size: 11px; color: var(--warm-gray); display: block; margin-top: 2px; }
  .pl-footer { background: var(--espresso); color: var(--warm-gray); text-align: center; padding: 28px 20px; font-size: 13px; margin-top: 60px; }
  .pl-footer em { color: var(--gold); font-family: 'Playfair Display', Georgia, serif; }
</style>
</head>
<body>

<div class="pl-header">
  <div class="pl-badge" id="pl-badge"></div>
  <div class="pl-h1" id="pl-h1"></div>
  <div class="pl-hsub" id="pl-hsub"></div>
</div>

<div class="pl-topbar">
  <div class="pl-steps">
    <div class="pl-pill active" id="pp0"></div>
    <div class="pl-pill" id="pp1"></div>
    <div class="pl-pill" id="pp2"></div>
    <div class="pl-pill" id="pp3"></div>
  </div>
  <div class="pl-lang">
    <button class="pl-lbtn active" id="lbtn-en" onclick="plLang('en')">EN</button>
    <button class="pl-lbtn" id="lbtn-es" onclick="plLang('es')">ES</button>
  </div>
</div>

<div class="pl-container">

  <div class="pl-welcome">
    <h2 id="wc-h"></h2>
    <p id="wc-p"></p>
  </div>

  <div class="pl-section">
    <div class="pl-sec-label">
      <div class="pl-num">1</div>
      <div class="pl-sec-title" id="s1-t"></div>
    </div>
    <div class="pl-card">
      <p id="s1-p"></p>
      <div class="pl-hint">💡 <strong id="s1-tl"></strong> <span id="s1-ts"></span></div>
    </div>
  </div>

  <div class="pl-section">
    <div class="pl-sec-label">
      <div class="pl-num">2</div>
      <div class="pl-sec-title" id="s2-t"></div>
    </div>
    <div class="pl-card">
      <p id="s2-p"></p>
      <div class="pl-sgrid">
        <div class="pl-scard"><span class="ic">🎨</span><h4 id="sg1t"></h4><p id="sg1p"></p></div>
        <div class="pl-scard"><span class="ic">📐</span><h4 id="sg2t"></h4><p id="sg2p"></p></div>
        <div class="pl-scard"><span class="ic">✅</span><h4 id="sg3t"></h4><p id="sg3p"></p></div>
        <div class="pl-scard"><span class="ic">🚫</span><h4 id="sg4t"></h4><p id="sg4p"></p></div>
        <div class="pl-scard"><span class="ic">🔧</span><h4 id="sg5t"></h4><p id="sg5p"></p></div>
      </div>
      <div class="pl-hint">🌟 <strong id="s2-tl"></strong> <span id="s2-ts"></span></div>
    </div>
  </div>

  <div class="pl-section">
    <div class="pl-sec-label">
      <div class="pl-num">3</div>
      <div class="pl-sec-title" id="s3-t"></div>
    </div>
    <div class="pl-card">
      <table class="pl-table">
        <thead><tr><th id="th1"></th><th id="th2"></th></tr></thead>
        <tbody id="ref-body"></tbody>
      </table>
    </div>
  </div>

  <div class="pl-section">
    <div class="pl-sec-label">
      <div class="pl-num">4</div>
      <div class="pl-sec-title" id="s4-t"></div>
    </div>
    <div class="pl-card">
      <p id="s4-hint" style="margin-bottom:16px;font-size:13px;color:var(--warm-gray);"></p>
      <ul class="pl-cl" id="pl-cl"></ul>
    </div>
  </div>

</div>

<div class="pl-footer">
  <em id="ft-brand"></em> <span id="ft-tag"></span>
</div>

<script>
var T = {
  en: {
    badge: 'New Tenant Orientation Guide',
    h1: 'Welcome to<br><em>Plaza Latina.</em>',
    hsub: 'Everything you need to get settled, pay on time, and make your space your own.',
    pills: ['01 Welcome', '02 Rent', '03 Signage', '04 Checklist'],
    wcH: "We're glad you're here.",
    wcP: "This guide walks you through everything you need to know as a new restaurant tenant at Plaza Latina — from how and when to pay rent, to expressing your brand through signage, to making sure nothing falls through the cracks during move-in. Read through at your own pace, check off your tasks, and don't hesitate to reach out to management with any questions.",
    s1T: 'Rent Payment System',
    s1P: 'All rent payments must be made through the <strong>AppFolio tenant portal</strong> — no other payment methods are accepted. Rent is due on the <strong>1st of each month</strong>. Receipts are accessible anytime through your AppFolio portal.',
    s1TL: 'Pro tip:',
    s1TS: 'Set up auto-pay directly in AppFolio so rent goes out automatically on the 1st — no reminders needed, total peace of mind.',
    s2T: 'Signage — Be Creative, Be You',
    s2P: 'Your sign is the first thing customers see. We <strong>encourage creativity</strong> — bold colors, unique fonts, neon, dimensional lettering, murals, and illuminated signage are all welcome.',
    sg: [
      ['Design Freedom', 'Express your brand fully. Choose your own fonts, colors, materials, and style. Neon signs, hand-painted boards, illuminated boxes — all fair game.'],
      ['Size & Placement', 'Signs must fit within your designated fascia area. Dimensions are in your lease addendum. No signage may extend beyond your unit boundaries.'],
      ['Approval Required', 'Submit a design mockup (PDF or image) to management for written approval before ordering or installing. Turnaround is typically 3–5 business days.'],
      ["What's Not Allowed", 'Flashing strobe lights and signs on shared walls or the parking lot are not permitted.'],
      ['Installation', 'Use a licensed sign contractor. Proof of insurance is required before installation. Coordinate with management on timing to avoid utility conflicts.']
    ],
    s2TL: 'We want your storefront to stand out.',
    s2TS: "Distinctive, well-designed signage benefits the whole plaza. Don't be shy — make it memorable.",
    s3T: 'Quick-Reference Breakdown',
    th: ['Topic', 'Summary'],
    rows: [
      ['Lease Start', 'Your lease begins on the date signed. Prorated rent applies if you move in mid-month.'],
      ['Security Deposit', 'Held by management. Returned within 60 days of lease end, less any deductions.'],
      ['Operating Hours', 'Thu & Mon 11AM–8PM · Fri–Sun 10AM–8PM. You must remain open during all building hours.'],
      ['Trash & Grease', "Use designated dumpsters only. Grease trap maintenance is tenant's responsibility."],
      ['Health Permits', 'Obtain all city/county permits before opening. Management does not handle licensing.'],
      ['Shared Spaces', 'Parking lot, sidewalks, and common areas are maintained by management. Do not use for storage.'],
      ['Maintenance Requests', 'Submit via tenant portal or call the office. Emergencies (gas, fire, water) call 911 first, then management.'],
      ['Subletting', 'Not permitted without written consent from management.']
    ],
    s4T: 'Move-In Checklist',
    s4H: 'Tap each item to mark it complete.',
    cl: [
      ['Sign and return lease agreement', 'Provide a copy to management and retain one for yourself'],
      ["Pay first month's rent and security deposit", 'First payment is made in person with management'],
      ['Set up AppFolio tenant portal account', "All rent payments must be made through AppFolio — enroll in auto-pay while you're there"],
      ['Complete move-in unit inspection with management', 'Document and photograph any pre-existing damage'],
      ['Obtain city/county business license', 'Required before opening to the public'],
      ['Pass health department inspection', 'Post permit in a visible location inside the restaurant'],
      ['Submit signage design for management approval', 'PDF or image mockup required — allow 3–5 business days'],
      ['Schedule and complete sign installation', 'Use licensed contractor; provide proof of insurance to management'],
      ['Set up utilities (gas, electric, water, internet)', 'Transfer accounts to your name before opening'],
      ['Confirm grease trap installation and service schedule', "Tenant's responsibility; keep service records on file"],
      ['Confirm emergency contacts are saved', 'Management office, after-hours line, and local fire/health departments'],
      ['Review and confirm insurance requirements with management', 'Provide certificate of general liability insurance naming plaza as additional insured']
    ],
    ftB: 'Welcome to Plaza Latina.',
    ftT: "We're rooting for your success. Let's build something great together."
  },
  es: {
    badge: 'Guía de Orientación para Nuevos Inquilinos',
    h1: 'Bienvenido a<br><em>Plaza Latina.</em>',
    hsub: 'Todo lo que necesitas para instalarte, pagar a tiempo y hacer tuyo tu espacio.',
    pills: ['01 Bienvenida', '02 Renta', '03 Rótulos', '04 Lista'],
    wcH: 'Nos alegra tenerte aquí.',
    wcP: 'Esta guía te explica todo lo que necesitas saber como nuevo inquilino de restaurante en Plaza Latina — desde cómo y cuándo pagar la renta, hasta cómo expresar tu marca a través de rótulos, y asegurarte de que nada quede pendiente durante la mudanza. Léela a tu ritmo, marca tus tareas y no dudes en comunicarte con la administración si tienes preguntas.',
    s1T: 'Sistema de Pago de Renta',
    s1P: 'Todos los pagos de renta deben realizarse a través del <strong>portal de inquilinos AppFolio</strong> — no se aceptan otros métodos de pago. La renta vence el <strong>1° de cada mes</strong>. Los recibos están disponibles en cualquier momento en tu portal AppFolio.',
    s1TL: 'Consejo útil:',
    s1TS: 'Configura el pago automático en AppFolio para que la renta salga automáticamente el día 1 — sin recordatorios, total tranquilidad.',
    s2T: 'Rótulos — Sé Creativo, Sé Tú',
    s2P: 'Tu rótulo es lo primero que ven los clientes. <strong>Fomentamos la creatividad</strong> — colores llamativos, fuentes únicas, neón, letras dimensionales, murales e iluminación. Esto es lo que necesitas saber:',
    sg: [
      ['Libertad de Diseño', 'Expresa tu marca plenamente. Elige tus propias fuentes, colores, materiales y estilo. Rótulos de neón, pizarras pintadas a mano, cajas iluminadas — todo está permitido.'],
      ['Tamaño y Ubicación', 'Los rótulos deben caber dentro de tu área de fachada designada. Las dimensiones están en el anexo de tu contrato. Ningún rótulo puede extenderse más allá de los límites de tu local.'],
      ['Aprobación Requerida', 'Envía un boceto de diseño (PDF o imagen) a la administración para aprobación escrita antes de ordenar o instalar. El tiempo de respuesta es típicamente 3–5 días hábiles.'],
      ['Lo que No Está Permitido', 'No se permiten luces estroboscópicas ni rótulos en paredes compartidas o en el estacionamiento.'],
      ['Instalación', 'Utiliza un contratista de rótulos con licencia. Se requiere comprobante de seguro antes de la instalación. Coordina con la administración el horario para evitar conflictos con servicios.']
    ],
    s2TL: 'Queremos que tu local destaque.',
    s2TS: 'Un rótulo distintivo y bien diseñado beneficia a toda la plaza. No seas tímido — hazlo memorable.',
    s3T: 'Resumen de Referencia Rápida',
    th: ['Tema', 'Resumen'],
    rows: [
      ['Inicio del Contrato', 'Tu contrato comienza en la fecha de firma. Se aplica renta proporcional si te mudas a mediados de mes.'],
      ['Depósito de Seguridad', 'Retenido por la administración. Se devuelve dentro de 60 días del fin del contrato, menos deducciones.'],
      ['Horario de Operación', 'Jue y Lun 11AM–8PM · Vie–Dom 10AM–8PM. Debes permanecer abierto durante todas las horas del edificio.'],
      ['Basura y Grasa', 'Usa solo los contenedores designados. El mantenimiento de la trampa de grasa es responsabilidad del inquilino.'],
      ['Permisos de Salud', 'Obtén todos los permisos municipales/del condado antes de abrir. La administración no gestiona licencias.'],
      ['Espacios Compartidos', 'El estacionamiento, banquetas y áreas comunes son mantenidos por la administración. No los uses para almacenamiento.'],
      ['Solicitudes de Mantenimiento', 'Envía por el portal o llama a la oficina. En emergencias (gas, incendio, agua) llama al 911 primero, luego a la administración.'],
      ['Subarrendamiento', 'No está permitido sin consentimiento escrito de la administración.']
    ],
    s4T: 'Lista de Verificación para Mudanza',
    s4H: 'Toca cada elemento para marcarlo como completado.',
    cl: [
      ['Firmar y entregar el contrato de arrendamiento', 'Proporciona una copia a la administración y conserva una para ti'],
      ['Pagar el primer mes de renta y el depósito de seguridad', 'El primer pago se realiza en persona con la administración'],
      ['Crear cuenta en el portal de inquilinos AppFolio', 'Todos los pagos deben hacerse por AppFolio — activa el pago automático al registrarte'],
      ['Realizar inspección del local con la administración', 'Documenta y fotografía cualquier daño preexistente'],
      ['Obtener licencia comercial municipal/del condado', 'Requerida antes de abrir al público'],
      ['Pasar la inspección del departamento de salud', 'Coloca el permiso en un lugar visible dentro del restaurante'],
      ['Enviar diseño del rótulo para aprobación', 'Se requiere boceto en PDF o imagen — permite 3–5 días hábiles'],
      ['Programar e instalar el rótulo', 'Usa contratista con licencia; entrega comprobante de seguro a la administración'],
      ['Contratar servicios públicos (gas, luz, agua, internet)', 'Transfiere las cuentas a tu nombre antes de abrir'],
      ['Confirmar instalación y mantenimiento de trampa de grasa', 'Responsabilidad del inquilino; conserva registros de servicio'],
      ['Guardar contactos de emergencia', 'Oficina de administración, línea fuera de horario y bomberos/departamento de salud'],
      ['Revisar y confirmar requisitos de seguro con la administración', 'Entrega certificado de seguro de responsabilidad general nombrando a la plaza como asegurado adicional']
    ],
    ftB: 'Bienvenido a Plaza Latina.',
    ftT: 'Apostamos por tu éxito. Construyamos algo grande juntos.'
  }
};

var checkStates = new Array(12).fill(false);

function plLang(lang) {
  var s = T[lang];
  document.getElementById('pl-badge').textContent = s.badge;
  document.getElementById('pl-h1').innerHTML = s.h1;
  document.getElementById('pl-hsub').textContent = s.hsub;
  ['pp0','pp1','pp2','pp3'].forEach(function(id, i) {
    document.getElementById(id).textContent = s.pills[i];
  });
  document.getElementById('wc-h').textContent = s.wcH;
  document.getElementById('wc-p').textContent = s.wcP;
  document.getElementById('s1-t').textContent = s.s1T;
  document.getElementById('s1-p').innerHTML = s.s1P;
  document.getElementById('s1-tl').textContent = s.s1TL;
  document.getElementById('s1-ts').textContent = s.s1TS;
  document.getElementById('s2-t').textContent = s.s2T;
  document.getElementById('s2-p').innerHTML = s.s2P;
  ['sg1t','sg2t','sg3t','sg4t','sg5t'].forEach(function(id, i) {
    document.getElementById(id).textContent = s.sg[i][0];
  });
  ['sg1p','sg2p','sg3p','sg4p','sg5p'].forEach(function(id, i) {
    document.getElementById(id).textContent = s.sg[i][1];
  });
  document.getElementById('s2-tl').textContent = s.s2TL;
  document.getElementById('s2-ts').textContent = s.s2TS;
  document.getElementById('s3-t').textContent = s.s3T;
  document.getElementById('th1').textContent = s.th[0];
  document.getElementById('th2').textContent = s.th[1];
  var rb = document.getElementById('ref-body');
  rb.innerHTML = '';
  s.rows.forEach(function(r) {
    rb.innerHTML += '<tr><td><strong>' + r[0] + '</strong></td><td>' + r[1] + '</td></tr>';
  });
  document.getElementById('s4-t').textContent = s.s4T;
  document.getElementById('s4-hint').textContent = s.s4H;
  var cl = document.getElementById('pl-cl');
  cl.innerHTML = '';
  s.cl.forEach(function(item, i) {
    var li = document.createElement('li');
    if (checkStates[i]) li.classList.add('done');
    li.innerHTML = '<div class="pl-cb"><div class="pl-cb-check"></div></div><div class="pl-il">' + item[0] + '<small>' + item[1] + '</small></div>';
    li.addEventListener('click', function() {
      checkStates[i] = !checkStates[i];
      li.classList.toggle('done');
    });
    cl.appendChild(li);
  });
  document.getElementById('ft-brand').textContent = s.ftB;
  document.getElementById('ft-tag').textContent = s.ftT;
  document.getElementById('lbtn-en').classList.toggle('active', lang === 'en');
  document.getElementById('lbtn-es').classList.toggle('active', lang === 'es');
}

plLang('en');
</script>

</body>
</html>
